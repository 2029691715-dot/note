<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - 现代化笔记应用</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-editor: #0f0f23;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --border: #2a2a4a;
      --link-highlight: #ffc857;
      --block-highlight: #4ecdc4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { height: 100vh; display: flex; }

    /* 左侧导航栏 */
    .sidebar-nav {
      width: 56px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      transition: all 0.2s;
    }

    .nav-btn:hover { background: var(--border); color: var(--text-primary); }
    .nav-btn.active { background: var(--accent); color: white; }
    .nav-btn svg { width: 20px; height: 20px; }

    .nav-bottom { margin-top: auto; }

    /* 中间文件列表 */
    .file-list {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .file-list-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .file-list-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .search-box {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
    }

    .search-box input:focus { outline: none; border-color: var(--accent); }

    .note-items {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .note-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.15s;
    }

    .note-item:hover { background: var(--border); }
    .note-item.active { background: var(--accent); }

    .note-item-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-date {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .note-item.active .note-item-date { color: rgba(255,255,255,0.7); }

    /* 主编辑区 */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-editor);
    }

    .editor-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .breadcrumb {
      flex: 1;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .breadcrumb span { color: var(--text-primary); }

    .editor-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .editor-wrapper {
      max-width: 800px;
      margin: 0 auto;
    }

    .title-input {
      width: 100%;
      background: transparent;
      border: none;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .title-input:focus { outline: none; }
    .title-input::placeholder { color: var(--text-secondary); }

    /* Tiptap 编辑器样式 */
    .ProseMirror {
      outline: none;
      min-height: 400px;
      font-size: 16px;
      line-height: 1.7;
    }

    .ProseMirror p { margin-bottom: 16px; }
    .ProseMirror h1 { font-size: 28px; margin: 32px 0 16px; }
    .ProseMirror h2 { font-size: 24px; margin: 28px 0 14px; }
    .ProseMirror h3 { font-size: 20px; margin: 24px 0 12px; }

    .ProseMirror strong { color: var(--link-highlight); }
    .ProseMirror em { color: var(--text-secondary); }

    .ProseMirror code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-size: 14px;
    }

    .ProseMirror pre {
      background: var(--bg-secondary);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .ProseMirror pre code { background: none; padding: 0; }

    .ProseMirror blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--text-secondary);
    }

    .ProseMirror ul, .ProseMirror ol {
      padding-left: 24px;
      margin: 12px 0;
    }

    .ProseMirror li { margin: 4px 0; }

    /* 双向链接样式 */
    .bi-link {
      color: var(--link-highlight);
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dashed var(--link-highlight);
      transition: all 0.2s;
    }

    .bi-link:hover {
      background: rgba(255, 200, 87, 0.15);
      border-bottom-style: solid;
    }

    /* 块引用样式 */
    .block-ref {
      display: inline;
      background: rgba(78, 205, 196, 0.15);
      border-left: 2px solid var(--block-highlight);
      padding: 4px 8px;
      border-radius: 0 4px 4px 0;
      color: var(--block-highlight);
      cursor: pointer;
    }

    .block-embed {
      background: rgba(78, 205, 196, 0.08);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      border: 1px solid var(--block-highlight);
    }

    .ProseMirror .is-empty::before {
      content: attr(data-placeholder);
      float: left;
      color: var(--text-secondary);
      pointer-events: none;
      height: 0;
    }

    /* 反向链接面板 */
    .backlinks-panel {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .backlinks-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .backlink-item {
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .backlink-item:hover { background: var(--border); }

    .backlink-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--link-highlight);
    }

    .backlink-context {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      opacity: 0.3;
    }

    .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* 标签样式 */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent);
      color: white;
      border-radius: 12px;
      font-size: 11px;
      margin-right: 4px;
    }

    /* 设置面板 */
    .settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .settings-panel {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .settings-section {
      margin-bottom: 24px;
    }

    .settings-section h4 {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .toggle-switch {
      width: 48px;
      height: 24px;
      background: var(--border);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch.active { background: var(--accent); }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .toggle-switch.active::after { transform: translateX(24px); }

    /* 知识图谱 */
    .graph-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      z-index: 100;
    }

    .graph-canvas { width: 100%; height: 100%; }

    .graph-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--bg-secondary);
      border: none;
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* 快捷键提示 */
    .keyboard-hint {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    kbd {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* 浅色模式 */
    body.light-mode {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-editor: #fafafa;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --border: #d2d2d7;
      --link-highlight: #b85900;
      --block-highlight: #00968f;
    }
    body.light-mode { background: var(--bg-primary); color: var(--text-primary); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
